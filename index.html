<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Scanner Project</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
            background: #161b22;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 20px;
        }

        .camera-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4/3;
            background: #000;
            margin: 0 auto 20px auto;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #30363d;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Scanner Matrix Animation overlay */
        .scanner-line {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0), #00ff00);
            box-shadow: 0 0 15px #00ff00;
            animation: scan 2.5s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .btn {
            background-color: #238636;
            color: #ffffff;
            border: 1px solid rgba(240,246,252,0.1);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin: 5px;
        }

        .btn:hover {
            background-color: #2ea44f;
        }

        .btn-secondary {
            background-color: #21262d;
            border-color: #30363d;
        }
        .btn-secondary:hover {
            background-color: #30363d;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>System Face Scanner</h1>
    <p>Grant camera permissions to begin setup.</p>

    <div class="camera-box">
        <div class="scanner-line" id="scannerLine"></div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <button class="btn" id="captureBtn">Capture & Scan</button>
    <button class="btn btn-secondary" id="resetBtn" style="display:none;">Retake</button>

    <div id="status">Status: Ready</div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scannerLine = document.getElementById('scannerLine');
    const statusText = document.getElementById('status');

    // Automatically request camera on load (works on PC, iOS, Android)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera error: ", err);
            statusText.innerText = "Status: Camera access denied or unsupported.";
        });

    // Capture functionality
    captureBtn.addEventListener('click', () => {
        if (video.srcObject) {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw current video frame onto canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Freeze frame display
            canvas.style.display = 'block';
            video.style.disabled = true;

            // Start scanning visual effects
            scannerLine.style.display = 'block';
            statusText.innerText = "Status: Initializing deep web lookup index...";
            statusText.style.color = "#00ff00";

            captureBtn.style.display = 'none';
            resetBtn.style.display = 'inline-block';

            // Simulated web scanning log updates
            setTimeout(() => { statusText.innerText = "Status: Crawling public indexes..."; }, 2000);
            setTimeout(() => { statusText.innerText = "Status: Parsing metadata blocks..."; }, 4000);
            setTimeout(() => { 
                statusText.innerText = "Status: Scan Complete. No malicious matches found."; 
                statusText.style.color = "#58a6ff";
                scannerLine.style.style.display = 'none'; // remove scanner animation
            }, 7000);
        }
    });

    // Reset layout
    resetBtn.addEventListener('click', () => {
        canvas.style.display = 'none';
        scannerLine.style.display = 'none';
        captureBtn.style.display = 'inline-block';
        resetBtn.style.display = 'none';
        statusText.innerText = "Status: Ready";
        statusText.style.color = "#8b949e";
    });
</script>
</body>
</html>
